<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Activador de Abundancia 7D</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .font-sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="font-sans bg-zinc-950 text-gray-900 flex justify-center items-center min-h-screen overflow-hidden">

    <div class="relative w-full max-w-md h-[94vh] sm:h-[840px] bg-zinc-900 rounded-[48px] p-3 shadow-2xl border-4 border-zinc-800 flex flex-col overflow-hidden">
        
        <!-- Pantalla Home con tu Logo -->
        <div id="pantalla-home" class="absolute inset-0 bg-[#c5a85c] z-50 flex flex-col justify-between p-8 text-center transition-all duration-500 overflow-y-auto no-scrollbar">
            <div class="flex flex-col items-center mt-16 space-y-6">
                <div class="w-48 h-48 flex items-center justify-center">
                    <img src="https://i.postimg.cc/9F2CgNmg/Logo-Activador-Abundancia-removebg-preview.png" alt="Logo Activador de Abundancia" class="w-full h-full object-contain">
                </div>
            </div>
            <div class="my-auto px-2">
                <p class="text-[19px] font-bold text-[#1c3c26] leading-relaxed">Los hábitos son acciones diarias que, acumuladas, logran un impacto significativo.</p>
            </div>
            <button onclick="document.getElementById('pantalla-home').classList.add('hidden')" class="w-full py-4 bg-[#1c3c26] text-white rounded-full font-bold uppercase tracking-widest hover:bg-[#152e1d] transition-all mb-4">
                Empezar
            </button>
        </div>

        <!-- Pantalla Interna -->
        <div class="w-full h-full rounded-[38px] overflow-hidden flex flex-col bg-white">
            <header class="p-5 pt-10 border-b border-gray-100">
                <span class="text-[10px] uppercase tracking-widest text-amber-600 font-bold block">Enfoque Diario</span>
                <h2 class="text-xl font-black text-gray-900">Día 1 de 7</h2>
            </header>
            
            <main class="flex-grow p-5 space-y-6 overflow-y-auto no-scrollbar">
                <!-- Tarjeta de Enfoque -->
                <div class="bg-amber-50 p-4 rounded-2xl border-l-4 border-amber-500">
                    <p class="text-xs font-bold text-amber-700 uppercase mb-1">Activación Mental</p>
                    <p class="text-sm italic text-gray-700">"El enfoque de hoy determina tu éxito de mañana."</p>
                </div>

                <!-- Checklist -->
                <div class="space-y-3">
                    <label class="text-xs font-bold text-gray-400 uppercase">Acciones de Enfoque</label>
                    <label class="flex items-start space-x-3 bg-white p-4 rounded-2xl border border-gray-100 shadow-sm cursor-pointer hover:bg-gray-50">
                        <input type="checkbox" class="w-5 h-5 text-amber-500 mt-0.5 rounded">
                        <span class="text-xs font-semibold text-gray-700">Realizar 20 minutos de ejercicio físico.</span>
                    </label>
                    <label class="flex items-start space-x-3 bg-white p-4 rounded-2xl border border-gray-100 shadow-sm cursor-pointer hover:bg-gray-50">
                        <input type="checkbox" class="w-5 h-5 text-amber-500 mt-0.5 rounded">
                        <span class="text-xs font-semibold text-gray-700">Desconectarte de internet por 10 min.</span>
                    </label>
                </div>
            </main>

            <!-- Navegación -->
            <nav class="p-4 bg-gray-50 border-t border-gray-100 shrink-0">
                <div class="flex justify-around bg-white p-2 rounded-2xl border border-gray-200 shadow-inner">
                    <button class="px-4 py-2 text-xs font-bold bg-amber-500 text-white rounded-xl">📅 Reto</button>
                    <button class="px-4 py-2 text-xs font-bold text-gray-400 hover:text-gray-900">🎧 Audios</button>
                    <button class="px-4 py-2 text-xs font-bold text-gray-400 hover:text-gray-900">🤖 IA</button>
                </div>
            </nav>
        </div>
    </div>
</body>
</html>
